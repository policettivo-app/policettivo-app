<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policettivo® — Assegna Protocollo</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; color: #000; }
    .navbar { background: #000; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .navbar-brand { color: #FFD008; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .btn-back { background: transparent; border: 1px solid #333; color: #fff; padding: 6px 14px; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 12px; cursor: pointer; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 24px 20px 60px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: #666; margin-bottom: 24px; }
    .section { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #000; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #FFD008; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 14px; outline: none; }
    .form-input:focus { border-color: #FFD008; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .config-btns { display: flex; gap: 12px; }
    .config-btn { flex: 1; padding: 16px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; text-align: center; background: #fff; font-family: 'Montserrat', sans-serif; transition: all 0.2s; }
    .config-btn.npl.active { background: #000; border-color: #000; color: #FFD008; }
    .config-btn.gpl.active { background: #FFD008; border-color: #FFD008; color: #000; }
    .config-btn-label { font-size: 16px; font-weight: 700; }
    .config-btn-sub { font-size: 10px; margin-top: 4px; opacity: 0.7; }
    .exercise-grid { display: flex; flex-direction: column; gap: 8px; }
    .exercise-item { border: 2px solid #eee; border-radius: 10px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; background: #fff; }
    .exercise-item:hover { border-color: #FFD008; }
    .exercise-item.selected { border-color: #000; background: #000; color: #fff; }
    .exercise-num { width: 28px; height: 28px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; color: #000; }
    .exercise-item.selected .exercise-num { background: #FFD008; color: #000; }
    .exercise-info { flex: 1; }
    .exercise-name { font-size: 14px; font-weight: 600; }
    .exercise-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .exercise-item.selected .exercise-meta { color: #aaa; }
    .exercise-cfg { margin-left: auto; }
    .cfg-toggle { display: flex; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
    .cfg-btn { padding: 4px 8px; font-size: 10px; font-weight: 700; cursor: pointer; background: transparent; border: none; color: #666; font-family: 'Montserrat', sans-serif; }
    .cfg-btn.active-npl { background: #000; color: #FFD008; }
    .cfg-btn.active-gpl { background: #FFD008; color: #000; }
    .selected-summary { background: #fff; border-radius: 16px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: none; }
    .selected-summary.show { display: block; }
    .summary-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .summary-list { font-size: 13px; color: #555; }
    .btn-salva { width: 100%; padding: 18px; background: #FFD008; color: #000; border: none; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-salva:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-banner { background: #000; color: #FFD008; padding: 16px 24px; border-radius: 12px; text-align: center; font-weight: 700; margin-bottom: 20px; display: none; }
    .success-banner.show { display: block; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">POLICETTIVO®</span>
    <a class="btn-back" id="btn-back" href="#">← Torna alla scheda</a>
  </nav>
  <div class="main">
    <div class="page-title">Assegna Protocollo</div>
    <div class="page-sub" id="patient-name">Caricamento...</div>
    <div class="success-banner" id="success-banner">✓ Protocollo assegnato con successo!</div>
    <div class="section">
      <div class="section-title">Dettagli protocollo</div>
      <div class="form-group">
        <label class="form-label">Nome protocollo</label>
        <input class="form-input" type="text" id="proto-nome" placeholder="es. Protocollo posturale base">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data inizio</label>
          <input class="form-input" type="date" id="proto-inizio">
        </div>
        <div class="form-group">
          <label class="form-label">Data fine (opzionale)</label>
          <input class="form-input" type="date" id="proto-fine">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Frequenza</label>
        <select class="form-input" id="proto-frequenza">
          <option value="Tutti i giorni">Tutti i giorni</option>
          <option value="5 volte a settimana">5 volte a settimana</option>
          <option value="3 volte a settimana">3 volte a settimana</option>
          <option value="2 volte a settimana">2 volte a settimana</option>
          <option value="1 volta a settimana">1 volta a settimana</option>
        </select>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Configurazione</div>
      <div class="config-btns">
        <button class="config-btn npl" onclick="setConfig('NPL')">
          <div class="config-btn-label">NPL</div>
          <div class="config-btn-sub">Nero Posteriore Laterale</div>
        </button>
        <button class="config-btn gpl" onclick="setConfig('GPL')">
          <div class="config-btn-label">GPL</div>
          <div class="config-btn-sub">Giallo Posteriore Laterale</div>
        </button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Esercizi Policettivo®</div>
      <p style="font-size:13px;color:#666;margin-bottom:16px">Clicca per selezionare. L'ordine di selezione diventa l'ordine del protocollo.</p>
      <div class="exercise-grid" id="exercise-grid">
        <div style="color:#999;font-size:13px">Caricamento esercizi...</div>
      </div>
    </div>
    <div class="selected-summary" id="selected-summary"></div>
    <button class="btn-salva" id="btn-salva" onclick="salvaProtocollo()">✓ Assegna protocollo</button>
  </div>
  <script>
    const SUPABASE_URL = 'https://kazlnoikvwdqwvxtigej.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imthemxub2lrdndkcXd2eHRpZ2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTM1MDEsImV4cCI6MjA5MzEyOTUwMX0.gCclWImW4SnIBcsNfFAW0KNtimEw6iiEiLnXbgC96mE'
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    const params = new URLSearchParams(window.location.search)
    const patientId = params.get('id')
    let patient = null, professional = null
    let selectedConfig = null
    let selectedExercises = []
    let exerciseCfg = {}
    let allExercises = []

    async function init() {
      document.getElementById('btn-back').href = 'paziente.html?id=' + patientId
      const { data: { user } } = await _supabase.auth.getUser()
      if (!user) { window.location.href = 'login.html'; return }
      const { data: prof } = await _supabase.from('professionals').select('*').eq('user_id', user.id).single()
      professional = prof
      const { data: pat } = await _supabase.from('patients').select('*').eq('id', patientId).single()
      patient = pat
      if (patient) {
        document.getElementById('patient-name').textContent = 'Paziente: ' + patient.nome + ' ' + patient.cognome
        if (patient.configurazione_default) setConfig(patient.configurazione_default)
      }
      document.getElementById('proto-inizio').value = new Date().toISOString().split('T')[0]
      const { data: exs } = await _supabase.from('exercises').select('*').eq('active', true).eq('fonte', 'policettivo').order('nome')
      allExercises = exs || []
      renderExercises()
    }

    function setConfig(cfg) {
      selectedConfig = cfg
      document.querySelectorAll('.config-btn').forEach(b => b.classList.remove('active'))
      document.querySelector('.config-btn.' + cfg.toLowerCase()).classList.add('active')
      selectedExercises.forEach(sel => { if (!exerciseCfg[sel.id]) exerciseCfg[sel.id] = cfg })
      renderExercises()
      updateSummary()
    }

    function renderExercises() {
      const grid = document.getElementById('exercise-grid')
      if (!allExercises.length) { grid.innerHTML = '<div style="color:#999;font-size:13px">Nessun esercizio disponibile</div>'; return }
      grid.innerHTML = allExercises.map(ex => {
        const isSelected = selectedExercises.some(s => s.id === ex.id)
        const selIdx = selectedExercises.findIndex(s => s.id === ex.id)
        const cfg = exerciseCfg[ex.id] || selectedConfig || 'NPL'
        return '<div class="exercise-item ' + (isSelected ? 'selected' : '') + '" onclick="toggleExercise(\'' + ex.id + '\')">' +
          '<div class="exercise-num">' + (isSelected ? (selIdx + 1) : '') + '</div>' +
          '<div class="exercise-info">' +
            '<div class="exercise-name">' + ex.nome + '</div>' +
            '<div class="exercise-meta">' + (ex.durata_default || 90) + ' sec &middot; ' + (ex.livello || 'base') + '</div>' +
          '</div>' +
          (isSelected ? '<div class="exercise-cfg" onclick="event.stopPropagation()"><div class="cfg-toggle">' +
            '<button class="cfg-btn ' + (cfg === 'NPL' ? 'active-npl' : '') + '" onclick="setCfg(\'' + ex.id + '\',\'NPL\')">NPL</button>' +
            '<button class="cfg-btn ' + (cfg === 'GPL' ? 'active-gpl' : '') + '" onclick="setCfg(\'' + ex.id + '\',\'GPL\')">GPL</button>' +
          '</div></div>' : '') +
        '</div>'
      }).join('')
    }

    function toggleExercise(id) {
      const idx = selectedExercises.findIndex(s => s.id === id)
      if (idx >= 0) {
        selectedExercises.splice(idx, 1)
        delete exerciseCfg[id]
      } else {
        selectedExercises.push({ id, source: 'policettivo' })
        exerciseCfg[id] = selectedConfig || 'NPL'
      }
      renderExercises()
      updateSummary()
    }

    function setCfg(id, cfg) {
      exerciseCfg[id] = cfg
      renderExercises()
    }

    function updateSummary() {
      const el = document.getElementById('selected-summary')
      if (!selectedExercises.length) { el.classList.remove('show'); return }
      el.classList.add('show')
      const pol = selectedExercises.length
      el.innerHTML = '<div class="summary-title">Riepilogo protocollo</div>' +
        '<div class="summary-list">' + pol + ' esercizi selezionati</div>'
    }

    async function salvaProtocollo() {
      const nome = document.getElementById('proto-nome').value.trim()
      if (!nome) { alert('Inserisci un nome per il protocollo'); return }
      if (!selectedConfig) { alert('Seleziona la configurazione NPL o GPL'); return }
      if (!selectedExercises.length) { alert('Seleziona almeno un esercizio'); return }
      const btn = document.getElementById('btn-salva')
      btn.disabled = true; btn.textContent = 'Salvataggio...'
      await _supabase.from('patient_protocols').update({ stato: 'sospeso' }).eq('patient_id', patientId).eq('stato', 'attivo')
      const { data: proto, error } = await _supabase.from('patient_protocols').insert({
        patient_id: patientId, professional_id: professional?.id || null,
        nome_personalizzato: nome,
        data_inizio: document.getElementById('proto-inizio').value,
        data_fine: document.getElementById('proto-fine').value,
        frequenza: document.getElementById('proto-frequenza').value,
        configurazione_generale: selectedConfig, stato: 'attivo'
      }).select().single()
      if (error) { alert('Errore: ' + error.message); btn.disabled = false; btn.textContent = '\u2713 Assegna protocollo'; return }
      const exRows = selectedExercises.map((sel, i) => {
        const ex = allExercises.find(e => e.id === sel.id)
        return { patient_protocol_id: proto.id, exercise_id: sel.id, ordine: i + 1, configurazione: exerciseCfg[sel.id] || selectedConfig, durata: ex?.durata_default || 90, ripetizioni: ex?.ripetizioni || 1 }
      })
      const { error: exErr } = await _supabase.from('patient_protocol_exercises').insert(exRows)
      if (exErr) { alert('Errore esercizi: ' + exErr.message); return }
      btn.textContent = '\u2713 Assegnato!'
      document.getElementById('success-banner').classList.add('show')
      setTimeout(() => { window.location.href = 'paziente.html?id=' + patientId }, 2000)
    }

    init()
  </script>
</body>
</html>

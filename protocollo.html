<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policettivo® — Il tuo protocollo</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FFD008">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Policettivo">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #000; min-height: 100vh; color: #fff; }
    .navbar { background: #000; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
    .navbar-logo { background: #FFD008; color: #000; font-weight: 700; font-size: 11px; letter-spacing: 2px; padding: 4px 10px; border-radius: 4px; }
    .navbar-name { color: #999; font-size: 13px; }
    .main { max-width: 480px; margin: 0 auto; padding: 24px 20px 80px; }
    .smile-card { text-align: center; background: #111; border: 1px solid #222; border-radius: 20px; padding: 28px 20px; margin-bottom: 20px; }
    .smile-big { font-size: 72px; margin-bottom: 10px; }
    .smile-title { font-size: 18px; font-weight: 700; color: #FFD008; margin-bottom: 6px; }
    .smile-sub { font-size: 13px; color: #888; line-height: 1.5; margin-bottom: 16px; }
    .btn-pagella { background: transparent; border: 1px solid #FFD008; color: #FFD008; padding: 8px 20px; border-radius: 20px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
    .greeting h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .greeting p { font-size: 14px; color: #888; margin-bottom: 28px; }
    .protocol-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .protocol-name { font-size: 18px; font-weight: 700; color: #FFD008; margin-bottom: 4px; }
    .config-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 8px; margin-bottom: 12px; }
    .config-npl { background: #FFD008; color: #000; }
    .config-gpl { background: #fff; color: #000; }
    .protocol-info { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .protocol-info-item { font-size: 12px; color: #666; }
    .protocol-info-item span { color: #fff; font-weight: 600; }
    .btn-start { width: 100%; padding: 18px; background: #FFD008; color: #000; border: none; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-start:hover { background: #e6bc00; }
    .section-title { font-size: 13px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .exercise-item { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 14px; }
    .exercise-num { background: #FFD008; color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .exercise-info { flex: 1; }
    .exercise-name { font-size: 14px; font-weight: 600; color: #fff; }
    .exercise-meta { font-size: 12px; color: #666; margin-top: 2px; }
    .exercise-config { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .cfg-npl { background: #FFD008; color: #000; }
    .cfg-gpl { background: #333; color: #FFD008; }
    .diary-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .diary-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .slider-group { margin-bottom: 16px; }
    .slider-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .slider-name { font-size: 13px; color: #aaa; }
    .slider-value { font-size: 16px; font-weight: 700; color: #FFD008; }
    input[type=range] { width: 100%; accent-color: #FFD008; height: 4px; }
    .diary-note { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 13px; resize: none; outline: none; margin-top: 4px; }
    .diary-note:focus { border-color: #FFD008; }
    .btn-diary { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #FFD008; color: #FFD008; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-diary:hover { background: #FFD008; color: #000; }
    .success-msg { background: #1a3a1a; border: 1px solid #2e7d32; color: #81c784; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-top: 12px; display: none; text-align: center; }
    .success-msg.visible { display: block; }
    .no-protocol { text-align: center; padding: 60px 20px; color: #555; }
    .no-protocol h2 { font-size: 18px; color: #777; margin-bottom: 8px; }
    .install-banner { background: #1a1a00; border: 1px solid #FFD008; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; display: none; }
    .install-banner p { font-size: 13px; color: #FFD008; margin-bottom: 10px; }
    .btn-install { background: #FFD008; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .ios-banner { background: #1a1a00; border: 1px solid #FFD008; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="navbar-logo">POLICETTIVO®</span>
    <span class="navbar-name" id="nav-name"></span>
  </nav>
  <div class="main">
    <div class="ios-banner" id="ios-banner">
      <p style="font-size:13px;color:#FFD008;margin-bottom:8px;font-weight:600">💛 Salva l'app sulla Home</p>
      <p style="font-size:12px;color:#aaa;line-height:1.6">1. Tocca <strong style="color:#fff">Condividi</strong> in basso<br>2. Tocca <strong style="color:#fff">Aggiungi alla schermata Home</strong><br>3. Tocca <strong style="color:#fff">Aggiungi</strong></p>
      <button onclick="document.getElementById('ios-banner').style.display='none'" style="margin-top:10px;background:transparent;border:1px solid #FFD008;color:#FFD008;padding:6px 14px;border-radius:6px;font-family:Montserrat,sans-serif;font-size:12px;cursor:pointer">Ho capito</button>
    </div>
    <div class="install-banner" id="install-banner">
      <p>💛 Aggiungi Policettivo® alla schermata Home!</p>
      <button class="btn-install" id="btn-install">Aggiungi alla Home</button>
    </div>

    <div class="smile-card" id="smile-card" style="display:none">
      <div class="smile-big" id="smile-emoji">😐</div>
      <div class="smile-title" id="smile-title"></div>
      <div class="smile-sub" id="smile-sub"></div>
      <button class="btn-pagella" id="btn-pagella">📊 Vedi la mia pagella</button>
    </div>

    <div class="greeting">
      <h1 id="greeting-title">Ciao 👋</h1>
      <p id="greeting-sub">Il tuo programma di oggi</p>
    </div>
    <div id="content-area">
      <div class="no-protocol"><h2>Caricamento...</h2></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kazlnoikvwdqwvxtigej.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imthemxub2lrdndkcXd2eHRpZ2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTM1MDEsImV4cCI6MjA5MzEyOTUwMX0.gCclWImW4SnIBcsNfFAW0KNtimEw6iiEiLnXbgC96mE'
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    const params = new URLSearchParams(window.location.search)
    const token = params.get('token')
    let patient = null, protocol = null, exercises = []
    let deferredPrompt = null

    const frasi = {
      top: ['Sei una leggenda della postura!', 'Inarrestabile! Il tuo corpo ti ringrazia.', 'Champion! Continua cosi.'],
      great: ['Stai andando alla grande!', 'Costanza perfetta. Sei sulla strada giusta!'],
      good: ['Ottimo lavoro oggi!', 'Ogni giorno conta. Stai costruendo qualcosa di grande.'],
      neutral: ['Oggi puoi ricominciare!', 'Ieri hai saltato — oggi e la tua occasione.'],
      bad: ['Il tuo corpo ti aspetta!', 'Anche solo i 3 Respiri fanno bene.'],
      worst: ['Torna in pista!', 'Oggi puoi ricominciare, anche un solo esercizio.']
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {})
    }

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e
      document.getElementById('install-banner').style.display = 'block'
    })

    document.getElementById('btn-install').addEventListener('click', () => {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('install-banner').style.display = 'none' }) }
    })

    async function init() {
      if (!token) { showError('Link non valido.'); return }
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
      const isStandalone = window.navigator.standalone === true
      if (isIOS && !isStandalone && !localStorage.getItem('ios_banner_dismissed')) {
        document.getElementById('ios-banner').style.display = 'block'
      }

      const { data: p } = await _supabase.from('patients').select('*').eq('access_token', token).single()
      if (!p) { showError('Paziente non trovato.'); return }
      patient = p
      document.getElementById('greeting-title').textContent = 'Ciao ' + patient.nome + ' 👋'
      document.getElementById('nav-name').textContent = patient.nome + ' ' + patient.cognome
      document.getElementById('btn-pagella').onclick = () => window.location.href = 'pagella.html?token=' + token

      const { data: prots } = await _supabase.from('patient_protocols').select('*').eq('patient_id', patient.id).eq('stato', 'attivo').order('created_at', { ascending: false })
      if (!prots || prots.length === 0) { showNoProtocol(); return }
      protocol = prots[0]

      const { data: ppe } = await _supabase.from('patient_protocol_exercises').select('*').eq('patient_protocol_id', protocol.id).order('ordine', { ascending: true })
      if (ppe && ppe.length > 0) {
        const exIds = ppe.map(e => e.exercise_id)
        const { data: exData } = await _supabase.from('exercises').select('*').in('id', exIds)
        const exMap = {}
        if (exData) exData.forEach(e => exMap[e.id] = e)
        exercises = ppe.map(e => ({ ...e, exercise: exMap[e.exercise_id] || null }))
      }
      renderProtocol()
      loadSmile()
    }

    async function loadSmile() {
      try {
        const { data: entries } = await _supabase.from('diary_entries').select('data,completato').eq('patient_id', patient.id).order('data', { ascending: false }).limit(30)
        const completate = (entries || []).filter(e => e.completato)
        const oggi = new Date(); oggi.setHours(0,0,0,0)
        let streak = 0, dc = new Date(oggi)
        for (let i = 0; i < 30; i++) {
          const ds = dc.toISOString().split('T')[0]
          if (completate.find(e => e.data === ds)) { streak++; dc.setDate(dc.getDate()-1) } else break
        }
        const ultima = completate.length > 0 ? new Date(completate[0].data) : null
        const diff = ultima ? Math.floor((oggi - ultima)/(1000*60*60*24)) : 999
        let emoji, title, frasePick
        if (diff===0 && streak>=6) { emoji='🤩'; title=streak+' giorni di fila!'; frasePick=frasi.top }
        else if (diff===0 && streak>=3) { emoji='😄'; title=streak+' giorni consecutivi!'; frasePick=frasi.great }
        else if (diff===0) { emoji='😊'; title='Hai fatto gli esercizi oggi!'; frasePick=frasi.good }
        else if (diff===1) { emoji='😐'; title='Ieri hai saltato'; frasePick=frasi.neutral }
        else if (diff===2) { emoji='😔'; title='2 giorni senza esercizi'; frasePick=frasi.bad }
        else { emoji='😢'; title=diff+' giorni senza esercizi'; frasePick=frasi.worst }
        document.getElementById('smile-emoji').textContent = emoji
        document.getElementById('smile-title').textContent = title
        document.getElementById('smile-sub').textContent = frasePick[Math.floor(Math.random()*frasePick.length)]
        document.getElementById('smile-card').style.display = 'block'
      } catch(e) {}
    }

    function renderProtocol() {
      const oggi = new Date()
      const inizio = new Date(protocol.data_inizio)
      const giorno = Math.max(1, Math.floor((oggi - inizio) / (1000*60*60*24)) + 1)
      const cfg = protocol.configurazione_generale || patient.configurazione_default || 'NPL'
      const cfgClass = cfg === 'NPL' ? 'config-npl' : 'config-gpl'
      let exHtml = ''
      if (exercises.length > 0) {
        exHtml = '<div class="section-title">Il tuo programma</div><div class="exercise-list">' +
          exercises.map((e, i) => {
            const ex = e.exercise
            const ecfg = e.configurazione || cfg
            return '<div class="exercise-item"><div class="exercise-num">' + (i+1) + '</div><div class="exercise-info"><div class="exercise-name">' + (ex ? ex.nome : 'Esercizio') + '</div><div class="exercise-meta">' + (e.durata || (ex ? ex.durata_default : 90)) + ' sec</div></div><span class="exercise-config cfg-' + ecfg.toLowerCase() + '">' + ecfg + '</span></div>'
          }).join('') + '</div>'
      }
      document.getElementById('content-area').innerHTML =
        '<div class="protocol-card"><div class="protocol-name">' + (protocol.nome_personalizzato || 'Protocollo') + '</div><div class="config-badge ' + cfgClass + '">' + cfg + '</div><div class="protocol-info"><div class="protocol-info-item">Giorno <span>' + giorno + '</span></div><div class="protocol-info-item">Esercizi <span>' + exercises.length + '</span></div><div class="protocol-info-item">Frequenza <span>' + (protocol.frequenza || 'Quotidiana') + '</span></div></div><button class="btn-start" onclick="iniziaEsercizi()">▶ Inizia gli esercizi</button></div>' +
        exHtml +
        '<div class="diary-card"><div class="diary-title">📓 Come stai oggi?</div><div class="slider-group"><div class="slider-label"><span class="slider-name">Dolore</span><span class="slider-value" id="val-dolore">0</span></div><input type="range" id="sl-dolore" min="0" max="10" value="0" oninput="document.getElementById(\'val-dolore\').textContent=this.value"></div><div class="slider-group"><div class="slider-label"><span class="slider-name">Rigidità</span><span class="slider-value" id="val-rigidita">0</span></div><input type="range" id="sl-rigidita" min="0" max="10" value="0" oninput="document.getElementById(\'val-rigidita\').textContent=this.value"></div><div class="slider-group"><div class="slider-label"><span class="slider-name">Equilibrio</span><span class="slider-value" id="val-equilibrio">5</span></div><input type="range" id="sl-equilibrio" min="0" max="10" value="5" oninput="document.getElementById(\'val-equilibrio\').textContent=this.value"></div><div class="slider-group"><div class="slider-label"><span class="slider-name">Energia</span><span class="slider-value" id="val-energia">5</span></div><input type="range" id="sl-energia" min="0" max="10" value="5" oninput="document.getElementById(\'val-energia\').textContent=this.value"></div><textarea class="diary-note" id="diary-note" rows="3" placeholder="Come ti senti? Note libere..."></textarea><button class="btn-diary" onclick="salvaDiario()">Salva diario di oggi</button><div class="success-msg" id="diary-success">✓ Diario salvato! Ottimo lavoro.</div></div>'
    }

    function iniziaEsercizi() {
      if (exercises.length === 0) { alert('Nessun esercizio nel protocollo.'); return }
      window.location.href = 'esercizio.html?token=' + token + '&idx=0'
    }

    async function salvaDiario() {
      const today = new Date().toISOString().split('T')[0]
      const { error } = await _supabase.from('diary_entries').insert({
        patient_id: patient.id, patient_protocol_id: protocol.id, data: today,
        dolore: parseInt(document.getElementById('sl-dolore').value),
        rigidita: parseInt(document.getElementById('sl-rigidita').value),
        equilibrio: parseInt(document.getElementById('sl-equilibrio').value),
        energia: parseInt(document.getElementById('sl-energia').value),
        note: document.getElementById('diary-note').value.trim() || null,
        completato: true
      })
      if (error) { alert('Errore: ' + error.message); return }
      document.getElementById('diary-success').classList.add('visible')
      loadSmile()
    }

    function showError(msg) {
      document.getElementById('content-area').innerHTML = '<div class="no-protocol"><h2>' + msg + '</h2></div>'
    }

    function showNoProtocol() {
      document.getElementById('greeting-sub').textContent = 'Nessun protocollo attivo'
      document.getElementById('content-area').innerHTML = '<div class="no-protocol"><h2>Nessun protocollo attivo</h2><p>Contatta il tuo professionista.</p></div>'
    }

    init()
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policettivo® — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .navbar { background: #000; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .navbar-brand { display: flex; align-items: center; gap: 12px; }
    .navbar-logo { background: #FFD008; color: #000; font-weight: 700; font-size: 11px; letter-spacing: 2px; padding: 4px 10px; border-radius: 4px; }
    .navbar-title { color: #fff; font-size: 14px; font-weight: 600; }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-user { color: #999; font-size: 13px; }
    .btn-admin { background: #FFD008; color: #000; border: none; padding: 6px 14px; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-logout { background: transparent; border: 1px solid #444; color: #fff; padding: 6px 14px; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 12px; cursor: pointer; }
    .btn-logout:hover { border-color: #FFD008; color: #FFD008; }
    .main { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .page-header h1 { font-size: 24px; font-weight: 700; color: #000; }
    .page-header p { font-size: 13px; color: #666; margin-top: 4px; }
    .btn-primary { background: #FFD008; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-primary:hover { background: #e6bc00; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 24px; border: 1px solid #eee; }
    .stat-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #000; }
    .stat-value.yellow { color: #FFD008; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
    .search-input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 14px; color: #000; outline: none; background: #fff; }
    .search-input:focus { border-color: #FFD008; }
    .search-count { font-size: 12px; color: #999; white-space: nowrap; }
    .section-title { font-size: 16px; font-weight: 700; color: #000; margin-bottom: 16px; }
    .patients-table { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 2.5fr 1.5fr 1fr 1fr 120px 40px; padding: 12px 24px; background: #f9f9f9; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 600; color: #999; letter-spacing: 1px; text-transform: uppercase; }
    .patient-row { display: grid; grid-template-columns: 2.5fr 1.5fr 1fr 1fr 120px 40px; padding: 14px 24px; border-bottom: 1px solid #f0f0f0; align-items: center; cursor: pointer; transition: background 0.15s; }
    .patient-row:last-child { border-bottom: none; }
    .patient-row:hover { background: #fffdf0; }
    .patient-name { font-weight: 600; font-size: 14px; color: #000; }
    .patient-email { font-size: 12px; color: #666; margin-top: 2px; }
    .patient-problem { font-size: 12px; color: #888; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-npl { background: #000; color: #FFD008; }
    .badge-gpl { background: #FFD008; color: #000; }
    .badge-attivo { background: #e8f5e9; color: #2e7d32; }
    .highlight { background: #FFD008; border-radius: 2px; padding: 0 1px; }
    .smile-cell { display: flex; flex-direction: column; gap: 4px; }
    .smile-row { display: flex; align-items: center; gap: 6px; }
    .smile-emoji { font-size: 18px; }
    .smile-days { font-size: 11px; color: #666; font-weight: 600; white-space: nowrap; }
    .smile-bar-bg { height: 4px; background: #eee; border-radius: 2px; width: 100%; }
    .smile-bar-fill { height: 4px; border-radius: 2px; transition: width 0.3s; }
    .empty-state { text-align: center; padding: 60px 24px; color: #999; }
    .empty-state p { font-size: 14px; }
    .btn-del { background: transparent; border: 1px solid #ffcdd2; color: #ef5350; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 36px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: #000; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 14px; color: #000; outline: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: #FFD008; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
    .btn-secondary { background: transparent; border: 1.5px solid #ddd; color: #333; padding: 12px 24px; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .config-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .config-option { border: 2px solid #eee; border-radius: 8px; padding: 14px; cursor: pointer; text-align: center; }
    .config-option.selected-npl { border-color: #000; background: #000; color: #FFD008; }
    .config-option.selected-gpl { border-color: #FFD008; background: #FFD008; color: #000; }
    .config-option .config-name { font-weight: 700; font-size: 16px; }
    .config-option .config-desc { font-size: 10px; margin-top: 2px; opacity: 0.7; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="navbar-logo">POLICETTIVO®</span>
      <span class="navbar-title">Area Professionista</span>
    </div>
    <div class="navbar-right">
      <button class="btn-admin" onclick="window.location.href='admin.html'">⚙️ Admin</button>
      <span class="navbar-user" id="user-email"></span>
      <button class="btn-logout" onclick="doLogout()">Esci</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <div><h1>Dashboard</h1><p id="welcome-msg">Bentornato</p></div>
      <button class="btn-primary" onclick="openModal()">+ Nuovo paziente</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Pazienti attivi</div><div class="stat-value" id="stat-pazienti">—</div></div>
      <div class="stat-card"><div class="stat-label">Protocolli assegnati</div><div class="stat-value" id="stat-protocolli">—</div></div>
      <div class="stat-card"><div class="stat-label">Sessioni oggi</div><div class="stat-value yellow" id="stat-sessioni">—</div></div>
    </div>
    <div class="section-title">I tuoi pazienti</div>
    <div class="search-bar">
      <input class="search-input" type="text" id="search-input" placeholder="🔍  Cerca per nome, cognome o problema..." oninput="filterPatients(this.value)">
      <span class="search-count" id="search-count"></span>
    </div>
    <div class="patients-table">
      <div class="table-header">
        <span>Paziente</span><span>Problema</span><span>Config.</span><span>Stato</span><span>Aderenza</span><span></span>
      </div>
      <div id="patients-list"><div class="empty-state"><p>Nessun paziente ancora. Aggiungine uno!</p></div></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Nuovo paziente</h2>
      <div class="form-row">
        <div class="form-group"><label>Nome *</label><input type="text" id="p-nome" placeholder="Mario"></div>
        <div class="form-group"><label>Cognome *</label><input type="text" id="p-cognome" placeholder="Rossi"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="p-email" placeholder="mario@email.it"></div>
        <div class="form-group"><label>Telefono</label><input type="tel" id="p-telefono" placeholder="+39 333 000 0000"></div>
      </div>
      <div class="form-group"><label>Problema principale</label><input type="text" id="p-problema" placeholder="es. Lombalgia, Cervicalgia..."></div>
      <div class="form-group"><label>Note cliniche</label><textarea id="p-note" placeholder="Annotazioni riservate..."></textarea></div>
      <div class="form-group">
        <label>Configurazione cuscini (opzionale)</label>
        <div class="config-selector">
          <div class="config-option" id="opt-npl" onclick="selectConfig('NPL')"><div class="config-name">NPL</div><div class="config-desc">Nero Posteriore Laterale</div></div>
          <div class="config-option" id="opt-gpl" onclick="selectConfig('GPL')"><div class="config-name">GPL</div><div class="config-desc">Giallo Posteriore Laterale</div></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Annulla</button>
        <button class="btn-primary" onclick="savePatient()">Salva paziente</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kazlnoikvwdqwvxtigej.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imthemxub2lrdndkcXd2eHRpZ2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTM1MDEsImV4cCI6MjA5MzEyOTUwMX0.gCclWImW4SnIBcsNfFAW0KNtimEw6iiEiLnXbgC96mE'
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    let currentProfessionalId = null
    let selectedConfig = null
    let allPatients = []

    async function init() {
      const { data: { session } } = await _supabase.auth.getSession()
      if (!session) { window.location.href = 'login.html'; return }
      document.getElementById('user-email').textContent = session.user.email
      document.getElementById('welcome-msg').textContent = 'Bentornato, ' + session.user.email.split('@')[0]
      const { data: prof } = await _supabase.from('professionals').select('id').eq('user_id', session.user.id).single()
      if (prof) { currentProfessionalId = prof.id; loadPatients(); loadStats(); }
    }

    async function loadPatients() {
      const { data: patients } = await _supabase.from('patients').select('*').eq('professional_id', currentProfessionalId).eq('stato', 'attivo').order('cognome', { ascending: true })
      allPatients = patients || []
      document.getElementById('stat-pazienti').textContent = allPatients.length

      const diaryMap = {}
      if (allPatients.length > 0) {
        const ids = allPatients.map(p => p.id)
        const { data: diaries } = await _supabase.from('diary_entries').select('patient_id,data,completato').in('patient_id', ids).order('data', { ascending: false })
        if (diaries) {
          diaries.forEach(d => {
            if (!diaryMap[d.patient_id]) diaryMap[d.patient_id] = []
            diaryMap[d.patient_id].push(d)
          })
        }
      }
      renderPatients(allPatients, '', diaryMap)
    }

    function getSmileData(entries) {
      if (!entries || entries.length === 0) return { emoji: '😐', giorni: 0, color: '#ddd', pct: 0, label: 'Nessuna sessione' }
      const oggi = new Date(); oggi.setHours(0,0,0,0)
      const ultimaData = new Date(entries[0].data); ultimaData.setHours(0,0,0,0)
      const diffGiorni = Math.floor((oggi - ultimaData) / (1000*60*60*24))
      const completate = entries.filter(e => e.completato)
      let streak = 0
      let dataCheck = new Date(oggi)
      for (let i = 0; i < 30; i++) {
        const dateStr = dataCheck.toISOString().split('T')[0]
        if (completate.find(e => e.data === dateStr)) { streak++; dataCheck.setDate(dataCheck.getDate() - 1) }
        else break
      }
      if (diffGiorni === 0 && streak >= 6) return { emoji: '🤩', giorni: streak, color: '#FFD008', pct: 100, label: streak + ' gg' }
      if (diffGiorni === 0 && streak >= 3) return { emoji: '😄', giorni: streak, color: '#4CAF50', pct: 80, label: streak + ' gg' }
      if (diffGiorni === 0 && streak >= 1) return { emoji: '😊', giorni: streak, color: '#8BC34A', pct: 60, label: streak + ' gg' }
      if (diffGiorni === 1) return { emoji: '😐', giorni: 0, color: '#FFC107', pct: 30, label: '1 gg fa' }
      if (diffGiorni === 2) return { emoji: '😔', giorni: 0, color: '#FF9800', pct: 15, label: '2 gg fa' }
      if (diffGiorni >= 3) return { emoji: '😢', giorni: 0, color: '#f44336', pct: 5, label: diffGiorni + ' gg fa' }
      return { emoji: '😐', giorni: 0, color: '#ddd', pct: 0, label: '—' }
    }

    function renderPatients(list, query, diaryMap) {
      const el = document.getElementById('patients-list')
      const count = document.getElementById('search-count')
      if (!list || list.length === 0) {
        el.innerHTML = query ? '<div class="empty-state"><p>Nessun paziente trovato per "' + query + '"</p></div>' : '<div class="empty-state"><p>Nessun paziente ancora. Aggiungine uno!</p></div>'
        count.textContent = ''; return
      }
      count.textContent = list.length + ' pazient' + (list.length === 1 ? 'e' : 'i')
      el.innerHTML = list.map(p => {
        const nome = highlight(p.nome + ' ' + p.cognome, query)
        const prob = highlight(p.problema_principale || '—', query)
        const smile = getSmileData(diaryMap ? diaryMap[p.id] : null)
        return '<div class="patient-row" onclick="goToPatient(\'' + p.id + '\')">' +
          '<div><div class="patient-name">' + nome + '</div><div class="patient-email">' + (p.email || '') + '</div></div>' +
          '<div class="patient-problem">' + prob + '</div>' +
          '<div>' + (p.configurazione_default ? '<span class="badge badge-' + p.configurazione_default.toLowerCase() + '">' + p.configurazione_default + '</span>' : '—') + '</div>' +
          '<div><span class="badge badge-attivo">' + p.stato + '</span></div>' +
          '<div class="smile-cell"><div class="smile-row"><span class="smile-emoji">' + smile.emoji + '</span><span class="smile-days">' + smile.label + '</span></div><div class="smile-bar-bg"><div class="smile-bar-fill" style="width:' + smile.pct + '%;background:' + smile.color + '"></div></div></div>' +
          '<div><button class="btn-del" onclick="event.stopPropagation();eliminaPaziente(\'' + p.id + '\',\'' + p.nome + ' ' + p.cognome + '\')">🗑</button></div>' +
          '</div>'
      }).join('')
    }

    function highlight(text, query) {
      if (!query || !text) return text
      const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi')
      return text.replace(re, '<mark class="highlight">$1</mark>')
    }

    function filterPatients(query) {
      const q = query.toLowerCase().trim()
      if (!q) { loadPatients(); return }
      const filtered = allPatients.filter(p => (p.nome + ' ' + p.cognome).toLowerCase().includes(q) || (p.problema_principale || '').toLowerCase().includes(q))
      renderPatients(filtered, q, null)
    }

    async function loadStats() {
      const { count: protCount } = await _supabase.from('patient_protocols').select('*', { count: 'exact', head: true }).eq('professional_id', currentProfessionalId).eq('stato', 'attivo')
      document.getElementById('stat-protocolli').textContent = protCount || 0
      const today = new Date().toISOString().split('T')[0]
      const { count: sessCount } = await _supabase.from('session_logs').select('*', { count: 'exact', head: true }).gte('started_at', today)
      document.getElementById('stat-sessioni').textContent = sessCount || 0
    }

    function openModal() { document.getElementById('modal-overlay').classList.add('open') }
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open')
      selectedConfig = null
      document.getElementById('opt-npl').className = 'config-option'
      document.getElementById('opt-gpl').className = 'config-option'
      ;['p-nome','p-cognome','p-email','p-telefono','p-problema','p-note'].forEach(id => document.getElementById(id).value = '')
    }
    function selectConfig(val) {
      selectedConfig = val
      document.getElementById('opt-npl').className = 'config-option' + (val === 'NPL' ? ' selected-npl' : '')
      document.getElementById('opt-gpl').className = 'config-option' + (val === 'GPL' ? ' selected-gpl' : '')
    }
    async function savePatient() {
      const nome = document.getElementById('p-nome').value.trim()
      const cognome = document.getElementById('p-cognome').value.trim()
      if (!nome || !cognome) { alert('Nome e cognome sono obbligatori.'); return }
      const { error } = await _supabase.from('patients').insert({
        professional_id: currentProfessionalId, nome, cognome,
        email: document.getElementById('p-email').value.trim() || null,
        telefono: document.getElementById('p-telefono').value.trim() || null,
        problema_principale: document.getElementById('p-problema').value.trim() || null,
        note_cliniche: document.getElementById('p-note').value.trim() || null,
        configurazione_default: selectedConfig, stato: 'attivo'
      })
      if (error) { alert('Errore: ' + error.message); return }
      closeModal(); loadPatients(); loadStats()
    }
    function goToPatient(id) { window.location.href = 'paziente.html?id=' + id }
    async function eliminaPaziente(id, nome) {
      if (!confirm('Eliminare ' + nome + '? Operazione irreversibile.')) return
      await _supabase.from('diary_entries').delete().eq('patient_id', id)
      await _supabase.from('patient_protocols').delete().eq('patient_id', id)
      await _supabase.from('patients').delete().eq('id', id)
      loadPatients(); loadStats()
    }
    async function doLogout() { await _supabase.auth.signOut(); window.location.href = 'login.html' }
    init()
  </script>
</body>
</html>
